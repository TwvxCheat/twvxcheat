<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwvxCheat - دخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px 35px;
            max-width: 400px;
            width: 100%;
        }
        
        .login-box .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-box .logo .icon {
            font-size: 40px;
            background: #1f6feb;
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            color: white;
        }
        
        .login-box .logo h2 {
            color: #f0f6fc;
            font-weight: 700;
            font-size: 24px;
        }
        
        .login-box .logo h2 span {
            color: #58a6ff;
        }
        
        .login-box .logo p {
            color: #8b949e;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .login-box .form-group {
            margin-bottom: 16px;
        }
        
        .login-box .form-group label {
            color: #8b949e;
            font-weight: 600;
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
        }
        
        .login-box .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: #f0f6fc;
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .login-box .form-group input:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }
        
        .login-box .form-group input::placeholder {
            color: #484f58;
        }
        
        .login-box .btn-login {
            width: 100%;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        
        .login-box .btn-login:hover {
            background: #2ea043;
        }
        
        .login-box .btn-login i {
            margin-left: 8px;
        }
        
        .login-box .footer {
            text-align: center;
            margin-top: 18px;
            color: #484f58;
            font-size: 12px;
        }
        
        .alert {
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 16px;
            font-size: 13px;
        }
        
        .alert-danger {
            background: #2d0b0b;
            border: 1px solid #da3633;
            color: #ffa198;
        }
        
        .alert-success {
            background: #0d2818;
            border: 1px solid #238636;
            color: #7ee787;
        }
        
        .alert-warning {
            background: #2d1b00;
            border: 1px solid #da8c00;
            color: #ffdf7e;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="login-box fade-in">
        <div class="logo">
            <div class="icon">
                <i class="fas fa-crown"></i>
            </div>
            <h2>Twvx<span>Cheat</span></h2>
            <p>نظام إدارة المفاتيح</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-{% if category == 'success' %}check-circle{% elif category == 'danger' %}exclamation-circle{% else %}info-circle{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/login">
            <div class="form-group">
                <label><i class="fas fa-user"></i> اسم المستخدم</label>
                <input type="text" name="username" placeholder="أدخل اسم المستخدم" required>
            </div>
            
            <div class="form-group">
                <label><i class="fas fa-lock"></i> كلمة المرور</label>
                <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
            </div>
            
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> دخول
            </button>
        </form>
        
        <div class="footer">
            TwvxCheat . 2026
        </div>
    </div>
</body>
</html>
